<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Tech Support Portal</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="header">
    <h1>Tech Support Portal</h1>
  </header>

  <div class="container">
    <div class="form-wrapper">
      <h2>Submit a Complaint</h2>
      
      <div class="form-group">
        <label for="username">Your Username</label>
        <input id="username" type="text" placeholder="bobsmith123" />
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input id="email" type="email" placeholder="john@example.com" />
        <p class="form-help">We will use this to respond to your issue. It is stored securely.</p>
      </div>

      <div class="form-group">
        <label for="message">Describe Your Issue</label>
        <textarea id="message"></textarea>
      </div>

      <button id="submitBtn" class="submit-btn">Submit Complaint</button>

      <div id="result"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
